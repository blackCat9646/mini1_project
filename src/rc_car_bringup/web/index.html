<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TurtleBot4 Web Control</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      --ink: #18202a;
      --line: #ccd4dd;
      --panel: #f7f9fb;
      --button: #1f6feb;
      --button-dark: #1858bc;
      --danger: #b42318;
      --ok: #137333;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #ffffff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 280px;
      gap: 16px;
      padding: 16px;
    }

    .map-wrap {
      border: 1px solid var(--line);
      background: #eef2f6;
      min-height: 520px;
      display: grid;
      place-items: center;
    }

    canvas {
      max-width: 100%;
      max-height: 78vh;
      image-rendering: pixelated;
      background: #d8dee6;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      background: #ffffff;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      height: 42px;
      border: 0;
      color: white;
      background: var(--button);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--button-dark);
    }

    button.secondary {
      background: #59636e;
    }

    button.secondary:hover {
      background: #444d56;
    }

    .status {
      min-height: 54px;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .connected {
      color: var(--ok);
      font-weight: 700;
    }

    .disconnected {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>TurtleBot4 Web Control</h1>
    <div id="connection" class="disconnected">ROS 연결 대기</div>
  </header>

  <main>
    <section class="map-wrap">
      <canvas id="map" width="610" height="770"></canvas>
    </section>

    <aside>
      <section class="panel">
        <h2>코너 호출</h2>
        <div class="grid">
          <button data-command="corner_1">1번</button>
          <button data-command="corner_2">2번</button>
          <button data-command="corner_3">3번</button>
          <button data-command="corner_4">4번</button>
        </div>
      </section>

      <section class="panel">
        <h2>Dock 제어</h2>
        <div class="grid">
          <button class="secondary" data-command="dock">Dock</button>
          <button class="secondary" data-command="undock">Undock</button>
        </div>
      </section>

      <section class="panel">
        <h2>상태</h2>
        <div id="status" class="status">웹 페이지 준비</div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
  <script>
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const statusBox = document.getElementById('status');
    const connectionBox = document.getElementById('connection');

    let mapInfo = null;
    let mapData = null;
    let robotPose = null;
    const corners = [
      { name: '1', x: -2.20, y: -0.60 },
      { name: '2', x: 0.00, y: -0.60 },
      { name: '3', x: 0.00, y: 2.20 },
      { name: '4', x: -2.20, y: 2.20 }
    ];

    const staticMapInfo = {
      width: 61,
      height: 77,
      resolution: 0.05,
      origin: {
        position: {
          x: -2.69,
          y: -1.07,
          z: 0.0
        }
      }
    };

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function drawMap() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!mapInfo || !mapData) {
        ctx.fillStyle = '#eef2f6';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#18202a';
        ctx.font = '16px Arial';
        ctx.fillText('지도 대기 중', 24, 34);
        return;
      }

      const width = mapInfo.width;
      const height = mapInfo.height;
      const displayWidth = height;
      const displayHeight = width;
      const scale = Math.min(canvas.width / displayWidth, canvas.height / displayHeight);
      const drawWidth = displayWidth * scale;
      const drawHeight = displayHeight * scale;
      const offsetX = (canvas.width - drawWidth) / 2;
      const offsetY = (canvas.height - drawHeight) / 2;

      ctx.fillStyle = '#eef2f6';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const value = mapData[y * width + x];
          if (value < 0) {
            ctx.fillStyle = '#b9c0c8';
          } else if (value > 65) {
            ctx.fillStyle = '#20242a';
          } else {
            ctx.fillStyle = '#ffffff';
          }

          const point = mapGridToCanvas(x, y, mapInfo, scale, offsetX, offsetY);
          const drawX = point.x;
          const drawY = point.y;
          ctx.fillRect(drawX, drawY, Math.ceil(scale), Math.ceil(scale));
        }
      }

      corners.forEach((corner) => {
        const point = mapPoseToCanvas(corner.x, corner.y, mapInfo, scale, offsetX, offsetY);
        ctx.beginPath();
        ctx.arc(point.x, point.y, Math.max(8, scale * 1.2), 0, Math.PI * 2);
        ctx.fillStyle = '#1f6feb';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(corner.name, point.x, point.y + 1);
      });

      if (robotPose) {
        const point = mapPoseToCanvas(
          robotPose.position.x,
          robotPose.position.y,
          mapInfo,
          scale,
          offsetX,
          offsetY
        );

        ctx.beginPath();
        ctx.arc(point.x, point.y, Math.max(6, scale * 2.0), 0, Math.PI * 2);
        ctx.fillStyle = '#e11d48';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
      }
    }

    function mapPoseToCanvas(mapX, mapY, info, scale, offsetX, offsetY) {
      const origin = info.origin.position;
      const resolution = info.resolution;
      const mapPixelX = (mapX - origin.x) / resolution;
      const mapPixelY = (mapY - origin.y) / resolution;

      // 위치 표시 보정: 맵 이미지는 유지하고 ROS 좌표 마커만 좌우 보정
      const transformedX = info.height - mapPixelY;
      const transformedY = info.width - mapPixelX;
      return {
        x: offsetX + transformedX * scale,
        y: offsetY + transformedY * scale
      };
    }

    function mapGridToCanvas(gridX, gridY, info, scale, offsetX, offsetY) {
      // 화면 표시 변환: 반시계 90도 회전 후 좌우반전
      const transformedX = gridY;
      const transformedY = info.width - gridX;
      return {
        x: offsetX + transformedX * scale,
        y: offsetY + transformedY * scale
      };
    }

    const ros = new ROSLIB.Ros({
      url: 'ws://' + window.location.hostname + ':9090'
    });

    const commandTopic = new ROSLIB.Topic({
      ros,
      name: '/rc_car/web/command',
      messageType: 'std_msgs/String'
    });

    const statusTopic = new ROSLIB.Topic({
      ros,
      name: '/rc_car/web/status',
      messageType: 'std_msgs/String'
    });

    const poseTopic = new ROSLIB.Topic({
      ros,
      name: '/rc_car/web/robot_pose',
      messageType: 'geometry_msgs/PoseStamped'
    });

    ros.on('connection', () => {
      connectionBox.textContent = 'ROS 연결 완료';
      connectionBox.className = 'connected';
      setStatus('ROS 연결 완료');
    });

    ros.on('error', () => {
      connectionBox.textContent = 'ROS 연결 오류';
      connectionBox.className = 'disconnected';
      setStatus('rosbridge 연결 확인 필요');
    });

    ros.on('close', () => {
      connectionBox.textContent = 'ROS 연결 끊김';
      connectionBox.className = 'disconnected';
    });

    statusTopic.subscribe((message) => {
      setStatus(message.data);
    });

    poseTopic.subscribe((message) => {
      robotPose = message.pose;
      drawMap();
    });

    document.querySelectorAll('button[data-command]').forEach((button) => {
      button.addEventListener('click', () => {
        const command = button.dataset.command;
        commandTopic.publish(new ROSLIB.Message({ data: command }));
        setStatus(command + ' 명령 전송');
      });
    });

    async function loadStaticMap() {
      try {
        const response = await fetch('hoon_map.pgm', { cache: 'no-store' });
        const buffer = await response.arrayBuffer();
        const pgm = parsePgm(buffer);

        mapInfo = staticMapInfo;
        mapData = pgm.pixels.map((pixel) => {
          if (pixel < 50) {
            return 100;
          }

          if (pixel > 205) {
            return 0;
          }

          return -1;
        });

        setStatus('정적 지도 로드 완료');
        drawMap();
      } catch (error) {
        setStatus('정적 지도 로드 실패: ' + error.message);
        drawMap();
      }
    }

    function parsePgm(buffer) {
      const bytes = new Uint8Array(buffer);
      let index = 0;

      function readToken() {
        while (index < bytes.length) {
          const char = String.fromCharCode(bytes[index]);
          if (char === '#') {
            while (index < bytes.length && bytes[index] !== 10) {
              index += 1;
            }
          } else if (/\s/.test(char)) {
            index += 1;
          } else {
            break;
          }
        }

        let token = '';
        while (index < bytes.length && !/\s/.test(String.fromCharCode(bytes[index]))) {
          token += String.fromCharCode(bytes[index]);
          index += 1;
        }

        return token;
      }

      const magic = readToken();
      const width = Number(readToken());
      const height = Number(readToken());
      const maxValue = Number(readToken());

      while (index < bytes.length && /\s/.test(String.fromCharCode(bytes[index]))) {
        index += 1;
      }

      if (magic !== 'P5') {
        throw new Error('P5 PGM 파일 아님');
      }

      if (width !== staticMapInfo.width || height !== staticMapInfo.height) {
        throw new Error('지도 크기 불일치');
      }

      if (maxValue <= 0) {
        throw new Error('잘못된 PGM 최대값');
      }

      return {
        width,
        height,
        pixels: Array.from(bytes.slice(index, index + width * height))
      };
    }

    loadStaticMap();
  </script>
</body>
</html>
