# 강의실 공유 Wi-Fi 보호 기준:
# 영상 디버그 토픽은 기본으로 끄고, rqt 확인이 꼭 필요할 때만 true로 바꿉니다.

supervisor_node:
  ros__parameters:
    state_topic: /rc_car/system_state
    set_state_service: /rc_car/set_state

tripod_trigger_node:
  ros__parameters:
    # 가능하면 /dev/video2 대신 /dev/v4l/by-id/... 값을 넣습니다.
    # auto는 보이는 카메라 중 열리는 장치를 선택합니다.
    # 빈 값이면 device_id를 fallback으로 사용합니다.
    camera_device: auto
    device_id: 2
    model_path: /home/rokey/mini1_ws/src/rc_car_bringup/models/tripod_cam.pt
    device: auto
    target_class_name: car
    confidence_threshold: 0.45
    required_consecutive_detections: 3
    allowed_consecutive_misses: 5
    frame_rate: 5.0
    image_width: 640
    image_height: 480
    show_window: false
    publish_debug_image: false
    publish_debug_compressed_image: false
    detected_topic: /rc_car/webcam_detected
    debug_image_topic: /rc_car/debug/tripod_image
    debug_compressed_image_topic: /rc_car/debug/tripod_image/compressed

tripod_yolo_node:
  ros__parameters:
    image_topic: /tripod/image_raw
    target_topic: /rc_car/target/tripod_2d
    model_path: /home/rokey/mini1_ws/src/rc_car_bringup/models/tripod_cam.pt
    device: auto
    target_class_name: car
    confidence_threshold: 0.45

pixel_to_map_node:
  ros__parameters:
    input_topic: /rc_car/target/tripod_2d
    output_topic: /rc_car/target/map
    homography_file: /home/rokey/mini1_ws/src/rc_car_bringup/config/tripod_camera_homography.yaml

approach_planner_node:
  ros__parameters:
    trigger_topic: /rc_car/webcam_detected
    return_topic: /rc_car/return_to_watch_area
    waypoint_file: /home/rokey/mini1_ws/src/rc_car_bringup/config/watch_area_waypoint.yaml
    navigate_action: /robot3/navigate_to_pose
    tracking_enable_topic: /rc_car/nav2_tracking_enabled
    rearm_when_trigger_is_false: true

oakd_yolo_depth_node:
  ros__parameters:
    rgb_topic: /robot3/oakd/rgb/preview/image_raw
    depth_topic: /robot3/oakd/stereo/image_raw
    target_topic: /rc_car/target/oakd_3d
    model_path: /home/rokey/mini1_ws/src/rc_car_bringup/models/robot_cam.pt
    device: auto
    target_class_name: car
    confidence_threshold: 0.45
    horizontal_fov_deg: 69.0
    inference_rate: 2.0
    depth_sample_radius: 4
    publish_debug_image: false
    publish_debug_compressed_image: false
    debug_image_topic: /rc_car/debug/oakd_image
    debug_compressed_image_topic: /rc_car/debug/oakd_image/compressed

follow_controller_node:
  ros__parameters:
    target_topic: /rc_car/target/oakd_3d
    scan_topic: /robot3/scan
    cmd_vel_topic: /robot3/cmd_vel
    follow_enabled: false
    desired_distance: 0.70
    stop_distance: 0.70
    front_safety_distance: 0.30
    target_timeout_sec: 1.0
    max_linear_speed: 0.08
    max_angular_speed: 0.40

nav2_target_tracker_node:
  ros__parameters:
    target_topic: /rc_car/target/oakd_3d
    enable_topic: /rc_car/nav2_tracking_enabled
    return_topic: /rc_car/return_to_watch_area
    navigate_action: /robot3/navigate_to_pose
    map_frame: map
    robot_frame: base_link
    tracking_enabled: false
    desired_distance: 0.70
    stop_distance: 0.70
    approach_margin: 0.15
    target_timeout_sec: 1.0
    goal_update_period: 1.0
    goal_change_distance: 0.20
    return_when_lost: true
    return_missed_frames: 5
    audio_topic: /robot3/cmd_audio
    beep_on_tracking: true
